name: Update website offer

on:
  push:
    paths:
      - .github/workflows/update-site-links.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update offer and auction comparison
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text()
          old = '<aside class="offer"><span class="price">Offers around &pound;2,000</span><p>Private offers considered.'
          comparison = (
              '<aside class="offer"><div style="display:flex;flex-wrap:wrap;gap:12px 20px;align-items:flex-start">'
              '<span class="price" style="flex:1 1 150px">Offers around US$2,500</span>'
              '<a href="https://www.sothebys.com/en/buy/auction/2021/fine-watches-3/gmt-master-ref-1675-property-of-brigadier-general-2" '
              'target="_blank" rel="noopener" style="flex:2 1 220px;margin:4px 0 16px;color:#fff;line-height:1.45;font-weight:700;text-underline-offset:3px">'
              "Known public auction comparison: Brigadier General Harold W. Ohlke's Rolex GMT-Master sold at Sotheby's for CHF 22,680, "
              'against a CHF 10,000-15,000 estimate.</a></div><p>Private offers considered.'
          )
          if old not in text:
              raise SystemExit('Expected offer markup was not found')
          path.write_text(text.replace(old, comparison))
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Update offer and Sotheby's comparison"
          git push
