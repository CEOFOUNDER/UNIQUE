name: Focus site on a single offer CTA

on:
  push:
    paths:
      - .github/workflows/update-site-links.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove competing conversion buttons
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text()

          replacements = {
              '<a href="#enquire" class="nav-cta">Enquire</a>': '',
              '<div class="hero-actions"><a class="button primary" href="#enquire">Make an enquiry</a><a class="button secondary" href="#provenance">Review the evidence</a></div>': '<div class="hero-actions"><a class="button primary" href="#enquire">Make an offer</a></div>',
              '<div class="contact-actions"><button class="button primary" type="button" id="copyInquiry">Copy enquiry text</button><a class="button secondary" href="https://drive.google.com/drive/folders/14j11Gdj-vmVNRk-QzA3r_DpyxX3Qil_A?usp=drive_link" target="_blank" rel="noopener">View full photo archive</a></div>': '<p class="note"><a href="https://drive.google.com/drive/folders/14j11Gdj-vmVNRk-QzA3r_DpyxX3Qil_A?usp=drive_link" target="_blank" rel="noopener" style="color:#fff;font-weight:700;text-underline-offset:3px">View the full photo archive</a></p>',
              '<p class="note" id="copyStatus" aria-live="polite">Enquiries can be made by replying through the channel where this page was shared.</p>': '<p class="note">To make an offer, reply through the channel where this page was shared.</p>',
          }

          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'Expected site element was not found: {old[:80]}')
              text = text.replace(old, new, 1)

          script_start = text.find('const inquiryText=')
          script_end = text.find('</script>', script_start)
          if script_start == -1 or script_end == -1:
              raise SystemExit('Expected copy-enquiry script was not found')
          text = text[:script_start] + text[script_end:]

          path.write_text(text)
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Focus site on a single offer CTA"
          git push
