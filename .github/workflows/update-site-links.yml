name: Publish valuation range and references

on:
  push:
    paths:
      - .github/workflows/update-site-links.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update valuation panel
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text()

          old = (
              '<aside class="offer"><div style="display:flex;flex-wrap:wrap;gap:12px 20px;align-items:flex-start">'
              '<span class="price" style="flex:1 1 150px">Offers around US$2,500</span>'
              '<a href="https://www.sothebys.com/en/buy/auction/2021/fine-watches-3/gmt-master-ref-1675-property-of-brigadier-general-2" '
              'target="_blank" rel="noopener" style="flex:2 1 220px;margin:4px 0 16px;color:#fff;line-height:1.45;font-weight:700;text-underline-offset:3px">'
              "Known public auction comparison: Brigadier General Harold W. Ohlke's Rolex GMT-Master sold at Sotheby's for CHF 22,680, "
              'against a CHF 10,000-15,000 estimate.</a></div><p>Private offers considered.'
          )

          new = (
              '<aside class="offer"><div style="display:grid;gap:10px">'
              '<span class="price">Offers invited: US$1,800&ndash;$2,800</span>'
              '<a href="https://www.af.mil/About-Us/Biographies/Display/Article/106022/brigadier-general-harold-w-ohlke/" '
              'target="_blank" rel="noopener" style="color:#fff;line-height:1.4;font-weight:700;text-underline-offset:3px">'
              'Official USAF biography: Brigadier General Harold W. Ohlke</a>'
              '<a href="https://www.rrauction.com/auctions/lot-detail/344854606193649-sm-65-atlas-general-dynamics-contractor-model/" '
              'target="_blank" rel="noopener" style="color:#fff;line-height:1.4;font-weight:700;text-underline-offset:3px">'
              'RR Auction comparable: General Dynamics Atlas contractor model sold for US$1,106</a>'
              '<a href="https://www.sothebys.com/en/buy/auction/2021/fine-watches-3/gmt-master-ref-1675-property-of-brigadier-general-2" '
              'target="_blank" rel="noopener" style="color:#fff;line-height:1.4;font-weight:700;text-underline-offset:3px;margin-bottom:8px">'
              "Sotheby's: Ohlke's Rolex GMT-Master sold for CHF 22,680</a>"
              '</div><p>Private offers considered.'
          )

          if old not in text:
              raise SystemExit('Expected current valuation panel was not found')
          text = text.replace(old, new)

          biography = '<a href="https://www.af.mil/About-Us/Biographies/Display/Article/106022/brigadier-general-harold-w-ohlke/" target="_blank" rel="noreferrer">USAF Ohlke biography</a>'
          comparable = '<a href="https://www.rrauction.com/auctions/lot-detail/344854606193649-sm-65-atlas-general-dynamics-contractor-model/" target="_blank" rel="noreferrer">Atlas model comparable</a>'
          text = text.replace(biography, '').replace(comparable, '')

          path.write_text(text)
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Publish valuation range and market references"
          git push
