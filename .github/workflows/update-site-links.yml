name: Refine Ohlke family wording

on:
  push:
    paths:
      - .github/workflows/update-site-links.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update family wording
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text()
          old = 'For an Ohlke family, researcher, or Cold War collector, the name is the value driver.'
          new = 'For an Ohlke family member, researcher, or Cold War collector, the name is the value driver.'
          if old not in text:
              raise SystemExit('Expected wording was not found')
          path.write_text(text.replace(old, new))
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Refine Ohlke family wording"
          git push
